<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Centre de contrôle - Gare Montparnasse</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* PANEL */

#panel{
width:350px;
background:#020617;
padding:25px;
box-shadow:0 0 20px black;
overflow:auto;
}

#panel h1{
font-size:22px;
margin-bottom:20px;
}

label{
font-size:13px;
opacity:0.7;
}

input,select{

width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
}

button{

width:100%;
padding:12px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

/* DISPLAY */

#display{

flex:1;
padding:30px;
}

header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;

}

header h1{

font-size:30px;
}

#clock{

font-size:22px;
color:#38bdf8;

}

table{

width:100%;
border-collapse:collapse;
background:#020617;
border-radius:10px;
overflow:hidden;
}

th{

background:#020617;
padding:15px;
font-size:14px;
text-transform:uppercase;
letter-spacing:1px;
border-bottom:2px solid #1e293b;

}

td{

padding:15px;
text-align:center;
border-bottom:1px solid #1e293b;

}

.status-ok{

color:#22c55e;
font-weight:bold;

}

.status-delay{

color:#f59e0b;
font-weight:bold;

}

.status-problem{

color:#ef4444;
font-weight:bold;

}

.delete{

background:#ef4444;
padding:6px 10px;
border-radius:4px;
cursor:pointer;

}

.delete:hover{

background:#dc2626;

}

</style>

</head>

<body>

<div id="panel">

<h1>Centre de gestion</h1>

<label>Numéro du train</label>
<input id="train">

<label>Type</label>
<select id="type">
<option>Départ</option>
<option>Arrivée</option>
</select>

<label>Destination / Provenance</label>
<input id="destination">

<label>Voie</label>
<select id="voie">

<option>A1</option>
<option>A2</option>

<option>B1</option>
<option>B2</option>
<option>B3</option>

<option>C1</option>
<option>C2</option>
<option>C3</option>

<option>D1</option>
<option>D2</option>
<option>D3</option>

<option>E1</option>
<option>E2</option>

<option>F1</option>
<option>F2</option>

</select>

<label>Heure</label>
<input type="time" id="heure">

<label>Status</label>
<select id="status">
<option value="ok">À l'heure</option>
<option value="delay">Retard</option>
<option value="problem">Problème</option>
</select>

<button onclick="addTrain()">Ajouter Train</button>

</div>


<div id="display">

<header>

<h1>Gare Paris Montparnasse</h1>

<div id="clock"></div>

</header>

<table id="board">

<tr>
<th>Train</th>
<th>Type</th>
<th>Destination</th>
<th>Heure</th>
<th>Voie</th>
<th>Status</th>
<th>Action</th>
</tr>

</table>

</div>


<script>

let trains=[]

function addTrain(){

let train=document.getElementById("train").value
let type=document.getElementById("type").value
let dest=document.getElementById("destination").value
let voie=document.getElementById("voie").value
let heure=document.getElementById("heure").value
let status=document.getElementById("status").value

if(!train || !heure) return

trains.push({
train,
type,
dest,
voie,
heure,
status
})

updateBoard()

}

function deleteTrain(index){

trains.splice(index,1)

updateBoard()

}

function updateBoard(){

let table=document.getElementById("board")

table.innerHTML=`

<tr>
<th>Train</th>
<th>Type</th>
<th>Destination</th>
<th>Heure</th>
<th>Voie</th>
<th>Status</th>
<th>Action</th>
</tr>

`

trains
.sort((a,b)=>a.heure.localeCompare(b.heure))
.forEach((t,i)=>{

let statusText=""
let statusClass=""

if(t.status==="ok"){
statusText="À l'heure"
statusClass="status-ok"
}

if(t.status==="delay"){
statusText="Retard"
statusClass="status-delay"
}

if(t.status==="problem"){
statusText="Problème"
statusClass="status-problem"
}

table.innerHTML+=`

<tr>

<td>${t.train}</td>
<td>${t.type}</td>
<td>${t.dest}</td>
<td>${t.heure}</td>
<td>${t.voie}</td>
<td class="${statusClass}">${statusText}</td>

<td>
<span class="delete" onclick="deleteTrain(${i})">Supprimer</span>
</td>

</tr>

`

})

}

function updateClock(){

let now=new Date()

let h=now.getHours().toString().padStart(2,"0")
let m=now.getMinutes().toString().padStart(2,"0")
let s=now.getSeconds().toString().padStart(2,"0")

document.getElementById("clock").innerText=h+":"+m+":"+s

}

setInterval(updateClock,1000)

</script>

</body>
</html>
