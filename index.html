<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Centre de Contrôle - Paris Montparnasse</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b1120;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:320px;
background:#020617;
padding:20px;
overflow:auto;
}

.main{
flex:1;
padding:25px;
overflow:auto;
}

h1{
margin-top:0;
}

input,select,textarea{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:none;
background:#1e293b;
color:white;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
margin-bottom:10px;
}

button:hover{
background:#2563eb;
}

table{
width:100%;
border-collapse:collapse;
background:#020617;
}

th,td{
padding:12px;
border-bottom:1px solid #1e293b;
text-align:center;
}

.status-ok{color:#22c55e;}
.status-delay{color:#f59e0b;}
.status-incident{color:#ef4444;}
.status-boarding{color:#38bdf8;}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:#020617;
padding:15px;
border-radius:10px;
text-align:center;
}

.log{
background:#020617;
padding:10px;
height:150px;
overflow:auto;
font-size:13px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Gestion Train</h2>

<input id="trainId" placeholder="Numéro train">

<select id="type">
<option>Départ</option>
<option>Arrivée</option>
</select>

<input id="destination" placeholder="Destination / Provenance">

<select id="quai">
<option>Q1</option>
<option>Q2</option>
<option>Q3</option>
<option>Q4</option>
<option>Q5</option>
<option>Q6</option>
<option>Q7</option>
<option>Q8</option>
</select>

<label>Heure prévue</label>
<input type="time" id="heurePrevue">

<label>Heure réelle</label>
<input type="time" id="heureReelle">

<select id="status">
<option value="ok">À l'heure</option>
<option value="delay">Retard</option>
<option value="boarding">Embarquement</option>
<option value="incident">Incident</option>
<option value="cancel">Annulé</option>
</select>

<button onclick="addTrain()">Ajouter train</button>
<button onclick="updateTrain()">Modifier train</button>

<hr>

<h2>Communication agents</h2>

<textarea id="messageAgent" placeholder="Message aux agents"></textarea>

<button onclick="sendMessage()">Envoyer</button>

<hr>

<h2>Sécurité</h2>

<button onclick="securityAlert()">⚠ Alerte sécurité</button>

</div>


<div class="main">

<h1>Centre de contrôle - Gare Paris Montparnasse</h1>

<div class="dashboard">

<div class="card">
<h3 id="clock"></h3>
Horloge
</div>

<div class="card">
<h3 id="trainCount">0</h3>
Trains en gestion
</div>

<div class="card">
<h3 id="incidentCount">0</h3>
Incidents
</div>

<div class="card">
<h3>8</h3>
Quais disponibles
</div>

</div>

<h2>Tableau ferroviaire</h2>

<table id="trainTable">

<tr>
<th>Train</th>
<th>Type</th>
<th>Destination</th>
<th>Quai</th>
<th>Prévu</th>
<th>Réel</th>
<th>Status</th>
<th>Action</th>
</tr>

</table>

<h2>Journal opérations</h2>

<div id="log" class="log"></div>

<h2>Messages agents</h2>

<div id="messages" class="log"></div>

</div>

<script>

let trains=[]
let incidents=0

function log(text){

let logDiv=document.getElementById("log")

let time=new Date().toLocaleTimeString()

logDiv.innerHTML+="["+time+"] "+text+"<br>"

logDiv.scrollTop=logDiv.scrollHeight

}

function addTrain(){

let id=document.getElementById("trainId").value

if(!id) return

let train={
id:id,
type:type.value,
dest:destination.value,
quai:quai.value,
prev:heurePrevue.value,
real:heureReelle.value,
status:status.value
}

let conflit=trains.find(t=>t.quai===train.quai && t.prev===train.prev)

if(conflit){
log("⚠ Conflit quai "+train.quai+" avec train "+conflit.id)
}

trains.push(train)

log("Train "+id+" ajouté")

updateTable()

}

function updateTrain(){

let id=document.getElementById("trainId").value

let train=trains.find(t=>t.id===id)

if(!train) return

train.type=type.value
train.dest=destination.value
train.quai=quai.value
train.prev=heurePrevue.value
train.real=heureReelle.value
train.status=status.value

log("Train "+id+" modifié")

updateTable()

}

function deleteTrain(index){

log("Train "+trains[index].id+" supprimé")

trains.splice(index,1)

updateTable()

}

function updateTable(){

let table=document.getElementById("trainTable")

table.innerHTML=`
<tr>
<th>Train</th>
<th>Type</th>
<th>Destination</th>
<th>Quai</th>
<th>Prévu</th>
<th>Réel</th>
<th>Status</th>
<th>Action</th>
</tr>
`

let incidentCount=0

trains.forEach((t,i)=>{

let statusClass="status-ok"

if(t.status==="delay") statusClass="status-delay"
if(t.status==="incident"){statusClass="status-incident";incidentCount++}
if(t.status==="boarding") statusClass="status-boarding"

table.innerHTML+=`

<tr>
<td>${t.id}</td>
<td>${t.type}</td>
<td>${t.dest}</td>
<td>${t.quai}</td>
<td>${t.prev}</td>
<td>${t.real}</td>
<td class="${statusClass}">${t.status}</td>
<td><button onclick="deleteTrain(${i})">Supprimer</button></td>
</tr>
`

})

document.getElementById("trainCount").innerText=trains.length
document.getElementById("incidentCount").innerText=incidentCount

}

function sendMessage(){

let msg=document.getElementById("messageAgent").value

if(!msg) return

let div=document.getElementById("messages")

let time=new Date().toLocaleTimeString()

div.innerHTML+="["+time+"] "+msg+"<br>"

}

function securityAlert(){

incidents++

log("🚨 Alerte sécurité déclenchée")

}

function updateClock(){

let now=new Date()

document.getElementById("clock").innerText=
now.getHours().toString().padStart(2,"0")+":"+
now.getMinutes().toString().padStart(2,"0")+":"+
now.getSeconds().toString().padStart(2,"0")

}

setInterval(updateClock,1000)

</script>

</body>
</html>
