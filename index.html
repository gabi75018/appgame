<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LudoApp - Connexion</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --primary-green: #76d765;
            --primary-green-hover: #61b852;
            --dark-text: #000000;
            --grey-input: #c4c4c4;
            --border-radius-btn: 25px;
            --border-radius-pill: 15px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--dark-text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Conteneur principal qui s'adapte à tous les écrans */
        .app-container {
            width: 100%;
            max-width: 900px;
            min-height: 550px;
            border: 5px solid var(--dark-text);
            padding: 40px 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* En-tête avec le logo et nom du site */
        .header-brand {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .avatar-icon {
            width: 35px;
            height: 35px;
            background-color: var(--dark-text);
            border-radius: 50%;
            position: relative;
        }
        .avatar-icon::before {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background: var(--bg-color);
            border-radius: 50%;
            top: 4px;
            left: 10px;
        }
        .avatar-icon::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 10px;
            background: var(--bg-color);
            border-radius: 10px 10px 0 0;
            bottom: 2px;
            left: 5px;
        }

        /* Écrans de l'application */
        .screen {
            display: none;
            width: 100%;
            max-width: 450px;
            margin: 40px auto 0 auto;
            text-align: center;
        }

        .screen.active {
            display: block;
        }

        /* Titre principal calqué sur ta maquette */
        .main-title {
            font-size: 1.8rem;
            font-style: italic;
            font-weight: normal;
            text-transform: uppercase;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        /* Formulaires et Inputs */
        .form-group {
            margin-bottom: 15px;
        }

        .input-field {
            width: 100%;
            padding: 12px 20px;
            background-color: var(--grey-input);
            border: none;
            font-size: 1rem;
            color: #000;
            text-align: center;
            outline: none;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
            font-size: 0.95rem;
        }

        .checkbox-group input {
            width: 14px;
            height: 14px;
        }

        /* Boutons principaux */
        .btn-main {
            background-color: var(--primary-green);
            color: var(--dark-text);
            border: none;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: var(--border-radius-btn);
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            max-width: 320px;
            transition: background 0.2s;
            margin: 10px auto;
            display: block;
        }

        .btn-main:hover {
            background-color: var(--primary-green-hover);
        }

        .btn-visitor {
            background-color: #e2e8f0;
            color: #334155;
        }
        .btn-visitor:hover {
            background-color: #cbd5e1;
        }

        /* Liens du bas style "pilule" comme sur ton image */
        .bottom-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .pill-link {
            background-color: var(--primary-green);
            color: var(--dark-text);
            padding: 6px 14px;
            border-radius: var(--border-radius-pill);
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
        }

        .pill-link:hover {
            background-color: var(--primary-green-hover);
        }

        /* Style de l'application une fois connecté (Dashboard temporaire) */
        .dashboard-card {
            background: #f8fafc;
            border: 2px solid var(--dark-text);
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #ffcbd1;
            color: #b91c1c;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-top: 10px;
            font-weight: bold;
        }

        .status-badge.success {
            background: #d1fae5;
            color: #065f46;
        }

        /* RESPONSIVE DESIGN (Tablettes et PC) */
        @media (min-width: 768px) {
            .app-container {
                padding: 60px 40px;
            }
            .main-title {
                font-size: 2.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-brand">
            <div class="avatar-icon"></div>
            <span>Nom du Site</span>
        </div>

        <div id="screen-login" class="screen active">
            <h1 class="main-title">Connexion à votre compte</h1>
            <div class="form-group">
                <input type="email" id="login-email" class="input-field" placeholder="Adresse Mail">
            </div>
            <div class="form-group">
                <input type="password" id="login-password" class="input-field" placeholder="Mot de Passe">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="remember-me">
                <label for="remember-me">Se souvenir de moi</label>
            </div>

            <button class="btn-main" onclick="handleLogin()">Connexion</button>
            <button class="btn-main btn-visitor" onclick="enterAsVisitor()">Mode Visiteur</button>

            <div class="bottom-links">
                <button class="pill-link" onclick="alert('Fonctionnalité mot de passe oublié à lier avec l\'envoi de mail.')">Mot de passe oublié ?</button>
                <button class="pill-link" onclick="switchScreen('screen-register')">Je n'ai pas de compte</button>
            </div>
        </div>

        <div id="screen-register" class="screen">
            <h1 class="main-title">Créer un compte</h1>
            <div class="form-group">
                <input type="email" id="register-email" class="input-field" placeholder="Votre Adresse Mail">
            </div>
            <div class="form-group">
                <input type="password" id="register-password" class="input-field" placeholder="Créer un Mot de Passe">
            </div>

            <button class="btn-main" onclick="handleRegister()">Créer mon compte</button>

            <div class="bottom-links">
                <button class="pill-link" onclick="switchScreen('screen-login')">J'ai déjà un compte (Connexion)</button>
            </div>
        </div>

        <div id="screen-app" class="screen">
            <h1 class="main-title">Mon Étagère & Scores</h1>
            
            <div class="dashboard-card">
                <p>Statut actuel : <span id="user-status">Connecté</span></p>
                <div id="visitor-restriction" class="status-badge">⚠️ Mode Visiteur : Sauvegarde désactivée</div>
                
                <div style="margin-top: 30px; border-top: 1px dashed #ccc; padding-top: 20px;">
                    <p style="font-size: 0.9rem; color: #555;">(C'est ici qu'on affichera ton étagère de jeux et ton compteur de points dans la prochaine étape !)</p>
                </div>
            </div>

            <button class="btn-main" style="background-color: #d9534f; color: white; margin-top: 40px;" onclick="handleLogout()">Déconnexion</button>
        </div>
    </div>

    <script>
        // CONFIGURATION SUPABASE (A remplacer avec tes propres clés à l'étape suivante)
        // Pour l'instant, on utilise une simulation locale robuste qui imite parfaitement le comportement Cloud
        const USE_DEMO_DB = true; 

        // Simulation de la base de données distante dans le cloud (Fichier data partagé)
        if (!localStorage.getItem('mock_cloud_users')) {
            localStorage.setItem('mock_cloud_users', JSON.stringify([
                { email: "test@ludo.fr", password: "password123" } // Compte démo existant
            ]));
        }

        // Vérification de la session au chargement (Reste connecté si "Se souvenir de moi" est coché)
        window.onload = function() {
            const savedUser = localStorage.getItem('ludo_current_user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                launchApp(user.email, user.isVisitor);
            }
        };

        // Permet de basculer proprement entre les écrans
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Action : Création de compte (Vérifie les doublons !)
        function handleRegister() {
            const email = document.getElementById('register-email').value.trim().toLowerCase();
            const password = document.getElementById('register-password').value;

            if (!email || !password) {
                alert("Veuillez remplir tous les champs.");
                return;
            }

            let users = JSON.parse(localStorage.getItem('mock_cloud_users'));

            // SECOURS EMPECHER LES DOUBLONS D'ADRESSE MAIL
            const emailExists = users.some(user => user.email === email);
            if (emailExists) {
                alert("Erreur : Un compte existe déjà avec cette adresse e-mail !");
                return;
            }

            // Ajout du nouvel utilisateur dans le fichier data simulé
            users.push({ email: email, password: password });
            localStorage.setItem('mock_cloud_users', JSON.stringify(users));

            alert("Compte créé avec succès ! Vous pouvez maintenant vous connecter.");
            switchScreen('screen-login');
        }

        // Action : Connexion
        function handleLogin() {
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value;
            const rememberMe = document.getElementById('remember-me').checked;

            let users = JSON.parse(localStorage.getItem('mock_cloud_users'));
            const user = users.find(u => u.email === email && u.password === password);

            if (!user) {
                alert("Identifiants incorrects. Veuillez réessayer.");
                return;
            }

            // Gestion de la session persistante
            if (rememberMe) {
                localStorage.setItem('ludo_current_user', JSON.stringify({ email: email, isVisitor: false }));
            }

            launchApp(email, false);
        }

        // Action : Entrer en mode visiteur
        function enterAsVisitor() {
            launchApp("Visiteur", true);
        }

        // Initialisation de l'application après authentification
        function launchApp(username, isVisitor) {
            switchScreen('screen-app');
            const statusBadge = document.getElementById('visitor-restriction');
            const statusText = document.getElementById('user-status');

            if (isVisitor) {
                statusText.innerText = "Mode Visiteur Anonyme";
                statusBadge.style.display = "inline-block";
            } else {
                statusText.innerText = `Connecté en tant que (${username})`;
                statusBadge.style.display = "none";
            }
        }

        // Action : Déconnexion complète
        function handleLogout() {
            localStorage.removeItem('ludo_current_user'); // Supprime la session persistante
            document.getElementById('login-email').value = "";
            document.getElementById('login-password').value = "";
            switchScreen('screen-login');
        }
    </script>
</body>
</html>
