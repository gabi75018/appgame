<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>CoasterControl Pro v1.0 - Panel de Gestion</title>
    <style>
        :root {
            --panel-bg: #2c3e50;
            --btn-red: #c0392b;
            --btn-green: #27ae60;
            --btn-yellow: #f1c40f;
            --lcd-bg: #1a1a1a;
            --lcd-text: #00ff00;
        }

        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Zone de Visualisation --- */
        #track-visualizer {
            flex: 1;
            background: #1e1e1e;
            position: relative;
            border-bottom: 4px solid #444;
            padding: 20px;
        }

        .track-line {
            position: absolute;
            top: 50%;
            left: 5%;
            right: 5%;
            height: 10px;
            background: #555;
            border-radius: 5px;
            transform: translateY(-50%);
        }

        .block-zone {
            position: absolute;
            top: 40%;
            height: 30px;
            border-left: 2px dashed #888;
            padding-left: 5px;
            font-size: 10px;
            color: #888;
        }

        .train {
            position: absolute;
            top: 50%;
            width: 60px;
            height: 25px;
            background: #3498db;
            border: 2px solid white;
            border-radius: 5px;
            transform: translateY(-50%);
            transition: left 0.1s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            z-index: 10;
        }

        /* --- Panel de Contrôle --- */
        #control-panel {
            height: 400px;
            background: var(--panel-bg);
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            padding: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        .panel-section {
            background: rgba(0,0,0,0.2);
            border: 2px solid #444;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 { margin: 0 0 10px 0; font-size: 14px; text-transform: uppercase; color: #bdc3c7; }

        /* --- Éléments d'interface --- */
        .lcd-display {
            background: var(--lcd-bg);
            color: var(--lcd-text);
            padding: 10px;
            font-family: 'Courier New', monospace;
            border-radius: 4px;
            border: 2px inset #444;
            height: 80px;
            overflow-y: auto;
            font-size: 13px;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 15px 10px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: filter 0.2s;
        }

        .btn:active { filter: brightness(0.8); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-dispatch { background: var(--btn-green); color: white; grid-column: span 2; height: 60px; font-size: 18px; }
        .btn-stop { background: var(--btn-red); color: white; height: 80px; font-size: 20px; }
        .btn-toggle { background: #7f8c8d; color: white; }
        .btn-toggle.active { background: var(--btn-yellow); color: black; }

        .status-light {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #333;
            display: inline-block;
            margin-right: 5px;
        }
        .light-on { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .light-off { background: #aa0000; }

    </style>
</head>
<body>

    <div id="track-visualizer">
        <div class="track-line"></div>
        
        <div class="block-zone" style="left: 5%; width: 20%;">STATION</div>
        <div class="block-zone" style="left: 25%; width: 15%;">LIFT HILL</div>
        <div class="block-zone" style="left: 40%; width: 40%;">MAIN COURSE</div>
        <div class="block-zone" style="left: 80%; width: 15%;">BRAKE RUN</div>

        <div id="train1" class="train" style="background: #e74c3c;">T1</div>
        <div id="train2" class="train" style="background: #3498db;">T2</div>
        <div id="train3" class="train" style="background: #f1c40f; color: black;">T3</div>
    </div>

    <div id="control-panel">
        <div class="panel-section">
            <h2>Sécurité Globale</h2>
            <button class="btn btn-stop" onclick="triggerEStop()">E-STOP (Arrêt Urgence)</button>
            <div class="lcd-display" id="log-display">
                SYSTEM READY...<br>
                ALL BLOCKS CLEAR.
            </div>
            <button class="btn btn-toggle" onclick="toggleAudio()">🔊 Annonce Station</button>
        </div>

        <div class="panel-section">
            <h2>Contrôle Station</h2>
            <div style="display: flex; justify-content: space-around; margin-bottom: 10px;">
                <div><div id="light-gates" class="status-light"></div> Portillons</div>
                <div><div id="light-harness" class="status-light"></div> Harnais</div>
            </div>
            <div class="grid-buttons">
                <button id="btn-gates" class="btn btn-toggle" onclick="toggleGates()">Ouvrir Portillons</button>
                <button id="btn-harness" class="btn btn-toggle" onclick="toggleHarness()">Ouvrir Harnais</button>
                <button id="btn-dispatch" class="btn btn-dispatch" onclick="dispatchTrain()" disabled>DISPATCH</button>
            </div>
        </div>

        <div class="panel-section">
            <h2>Statut du Circuit</h2>
            <div id="block-status" style="font-size: 12px; line-height: 2;">
                STATION: <span id="s-stat" style="color:red">OCCUPÉ</span><br>
                LIFT: <span id="l-stat">LIBRE</span><br>
                MAIN: <span id="m-stat">LIBRE</span><br>
                BRAKES: <span id="b-stat">LIBRE</span>
            </div>
            <hr width="100%">
            <div style="font-size: 11px;">
                Vitesse : <span id="speed-val">0</span> km/h<br>
                Mode : <span style="color: var(--btn-yellow)">MANUEL</span>
            </div>
        </div>
    </div>

<script>
    // --- Configuration ---
    const trains = [
        { id: 'train1', pos: 7, status: 'station', speed: 0 },
        { id: 'train2', pos: 82, status: 'moving', speed: 0 },
        { id: 'train3', pos: 45, status: 'moving', speed: 0 }
    ];

    let systemActive = true;
    let gatesOpen = false;
    let harnessOpen = false;
    let blocks = { station: true, lift: false, main: true, brakes: true };

    // --- Logique de Simulation ---
    function update() {
        if (!systemActive) return;

        trains.forEach(t => {
            const el = document.getElementById(t.id);
            
            // Logique de mouvement simplifiée par zones
            if (t.status === 'moving') {
                let nextPos = t.pos + 0.2;

                // Gestion des collisions (Système de blocs)
                if (nextPos >= 25 && nextPos < 26 && blocks.lift) t.speed = 0; // Stop avant lift
                else if (nextPos >= 40 && nextPos < 41 && blocks.main) t.speed = 0; // Stop avant main
                else if (nextPos >= 80 && nextPos < 81 && blocks.brakes) t.speed = 0; // Stop avant brakes
                else if (nextPos >= 95) { // Boucle vers la station
                    if (blocks.station) {
                        t.speed = 0;
                        t.pos = 94.5;
                    } else {
                        t.pos = 5;
                        t.status = 'station';
                        log("Train en gare.");
                    }
                } else {
                    t.pos = nextPos;
                    t.speed = 45;
                }
            }
            
            el.style.left = t.pos + "%";
        });

        updateBlockStatus();
        checkDispatchReady();
        document.getElementById('speed-val').innerText = trains[0].status === 'station' ? 0 : 72;
    }

    function updateBlockStatus() {
        // Détermine quel bloc est occupé
        let b = { station: false, lift: false, main: false, brakes: false };
        trains.forEach(t => {
            if (t.pos < 25) b.station = true;
            else if (t.pos < 40) b.lift = true;
            else if (t.pos < 80) b.main = true;
            else b.brakes = true;
        });
        blocks = b;

        document.getElementById('s-stat').innerText = b.station ? "OCCUPÉ" : "LIBRE";
        document.getElementById('s-stat').style.color = b.station ? "red" : "lime";
        document.getElementById('l-stat').innerText = b.lift ? "OCCUPÉ" : "LIBRE";
        document.getElementById('l-stat').style.color = b.lift ? "red" : "lime";
        document.getElementById('m-stat').innerText = b.main ? "OCCUPÉ" : "LIBRE";
        document.getElementById('m-stat').style.color = b.main ? "red" : "lime";
        document.getElementById('b-stat').innerText = b.brakes ? "OCCUPÉ" : "LIBRE";
        document.getElementById('b-stat').style.color = b.brakes ? "red" : "lime";
    }

    // --- Commandes ---
    function toggleGates() {
        if (!systemActive) return;
        gatesOpen = !gatesOpen;
        document.getElementById('btn-gates').classList.toggle('active');
        document.getElementById('light-gates').classList.toggle('light-on');
        log(gatesOpen ? "Portillons ouverts" : "Portillons fermés");
    }

    function toggleHarness() {
        if (!systemActive) return;
        if (gatesOpen) {
            log("ERREUR : Fermez les portillons d'abord !");
            return;
        }
        harnessOpen = !harnessOpen;
        document.getElementById('btn-harness').classList.toggle('active');
        document.getElementById('light-harness').classList.toggle('light-on');
        log(harnessOpen ? "Harnais déverrouillés" : "Harnais verrouillés");
    }

    function checkDispatchReady() {
        const canDispatch = !gatesOpen && !harnessOpen && !blocks.lift && systemActive;
        document.getElementById('btn-dispatch').disabled = !canDispatch;
    }

    function dispatchTrain() {
        const trainInStation = trains.find(t => t.status === 'station');
        if (trainInStation) {
            trainInStation.status = 'moving';
            trainInStation.pos = 6;
            log("DISPATCH : Train en route vers le Lift.");
        }
    }

    function triggerEStop() {
        systemActive = !systemActive;
        const color = systemActive ? "var(--btn-red)" : "#ff0000";
        document.body.style.boxShadow = systemActive ? "none" : "inset 0 0 100px red";
        log(systemActive ? "SYSTÈME RÉINITIALISÉ" : "!!! ARRÊT D'URGENCE ACTIVÉ !!!");
    }

    function log(msg) {
        const display = document.getElementById('log-display');
        display.innerHTML += `<br>> ${msg}`;
        display.scrollTop = display.scrollHeight;
    }

    function toggleAudio() {
        log("Annonce : 'Restez assis, gardez les mains à l'intérieur...'");
    }

    // Boucle de rendu
    setInterval(update, 50);

</script>
</body>
</html>
