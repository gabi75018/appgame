<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LudoApp - Compteur de points</title>
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc;
            --primary: #38bdf8; --border: rgba(255, 255, 255, 0.1);
        }
        body.light-theme {
            --bg-color: #f1f5f9; --card-bg: #ffffff; --text-main: #0f172a; --border: rgba(0, 0, 0, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background-color: var(--card-bg); border-bottom: 1px solid var(--border); }
        .brand { font-size: 1.5rem; font-weight: 700; color: var(--primary); text-decoration: none; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-weight: 600; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        .main-container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .score-card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
        .btn-primary { background-color: var(--primary); color: #0f172a; }
        .btn-calc { padding: 6px 12px; background: #334155; color: white; border-radius: 6px; border: none; font-size: 0.9rem; cursor: pointer; margin-left: 5px;}
        .player-name { font-size: 1.2rem; font-weight: 600; }
        .score-val { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>

    <nav>
        <a href="accueil.html" class="brand">🎲 LudoApp</a>
        <ul class="nav-links">
            <li><a href="accueil.html">Accueil</a></li>
            <li><a href="compteur.html" class="active">Compteur</a></li>
            <li><a href="profil.html">Mon Profil</a></li>
            <li><a href="legal.html">Infos Légales</a></li>
        </ul>
    </nav>

    <div class="main-container">
        <h2 style="margin-bottom: 20px;">Calculateur de Scores</h2>
        <button class="btn btn-primary" style="margin-bottom: 20px; width: 100%;" onclick="addPlayer()">➕ Ajouter un joueur</button>
        
        <div id="players-list"></div>

        <button class="btn" style="background-color: #10b981; color: white; width: 100%; margin-top: 20px;" onclick="saveGame()">💾 Enregistrer la fin de partie</button>
    </div>

    <script>
        let players = [];

        window.onload = function() {
            if(localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
        };

        function addPlayer() {
            const name = prompt("Nom du joueur :");
            if(name) {
                players.push({ name: name, score: 0 });
                renderPlayers();
            }
        }

        function renderPlayers() {
            const list = document.getElementById('players-list');
            list.innerHTML = "";
            players.forEach((player, idx) => {
                const card = document.createElement('div');
                card.className = "score-card";
                card.innerHTML = `
                    <div class="player-name">${player.name}</div>
                    <div style="display:flex; align-items:center; gap: 15px;">
                        <button class="btn-calc" onclick="updateScore(${idx}, -1)">-1</button>
                        <span class="score-val">${player.score}</span>
                        <button class="btn-calc" onclick="updateScore(${idx}, 1)">+1</button>
                        <button class="btn-calc" style="background-color:var(--primary); color:#000;" onclick="updateScore(${idx}, 5)">+5</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function updateScore(idx, value) {
            players[idx].score += value;
            renderPlayers();
        }

        function saveGame() {
            if(players.length === 0) return;
            let history = JSON.parse(localStorage.getItem('games_history') || '[]');
            history.push({ date: new Date().toLocaleDateString(), results: [...players] });
            localStorage.setItem('games_history', JSON.stringify(history));
            alert("Partie sauvegardée avec succès !");
            players = [];
            renderPlayers();
        }
    </script>
</body>
</html>
