<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LudoApp - Découvrir des jeux</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --border: rgba(255, 255, 255, 0.1);
        }

        body.light-theme {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 40px;
            transition: background 0.3s, color 0.3s;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
        }

        .brand { font-size: 1.5rem; font-weight: 700; color: var(--primary); text-decoration: none; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 0.95rem; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        .main-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        .search-section { display: flex; gap: 10px; margin-bottom: 30px; }
        .search-bar {
            flex: 1; padding: 14px; border-radius: 10px; border: 1px solid var(--border);
            background-color: var(--card-bg); color: var(--text-main); font-size: 1rem;
        }
        
        .btn {
            padding: 12px 24px; border-radius: 10px; border: none; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background-color: var(--primary); color: #0f172a; }
        .btn-primary:hover { background-color: var(--primary-hover); }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .game-card {
            background-color: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between;
        }

        .game-img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; background-color: #334155; margin-bottom: 15px; }
        .game-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; }
        .game-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 15px; }
        
        .amazon-link { display: inline-block; color: #f59e0b; text-decoration: none; font-size: 0.85rem; font-weight: 600; margin-bottom: 15px; }
        .amazon-link:hover { text-decoration: underline; }

        .actions-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 15px; }
        .btn-action { padding: 6px; font-size: 0.7rem; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-main); cursor: pointer; }
        .btn-action:hover { background: rgba(56, 189, 248, 0.1); border-color: var(--primary); }

        .rating-zone { display: flex; align-items: center; gap: 5px; font-size: 0.85rem; }
        .stars { color: #f59e0b; cursor: pointer; }

        .center-zone { text-align: center; margin-top: 30px; }
        .not-found-box {
            background-color: rgba(239, 68, 68, 0.1); border: 1px dashed #ef4444;
            padding: 20px; border-radius: 12px; display: none; margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 15px; }
            .search-section { flex-direction: column; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="accueil.html" class="brand">🎲 LudoApp</a>
        <ul class="nav-links">
            <li><a href="accueil.html" class="active">Accueil</a></li>
            <li><a href="compteur.html">Compteur</a></li>
            <li><a href="profil.html">Mon Compte</a></li>
            <li><a href="legal.html">Infos Légales</a></li>
        </ul>
    </nav>

    <div class="main-container">
        <div class="search-section">
            <input type="text" id="search-input" class="search-bar" placeholder="Rechercher un jeu (ex: Cooking Fever, Catan...)" oninput="filterGames()">
        </div>

        <div id="not-found" class="not-found-box">
            <p style="margin-bottom: 10px;">⚠️ Aucun jeu trouvé avec ce nom dans la base mondiale.</p>
            <button class="btn btn-primary" onclick="openAddGameForm()">Proposer l'ajout de ce jeu à l'application</button>
        </div>

        <div class="games-grid" id="games-grid"></div>

        <div class="center-zone">
            <button id="load-more-btn" class="btn btn-primary" style="display: none;" onclick="loadMoreGames()">Voir plus de jeux</button>
        </div>
    </div>

    <script>
        let displayedCount = 10; 
        let activeGames = []; 
        let typingTimer;

        window.onload = function() { 
            if(!localStorage.getItem('ludo_session')) { 
                window.location.href = "index.html"; 
                return; 
            } 
            if(localStorage.getItem('theme') === 'light') { 
                document.body.classList.add('light-theme'); 
            } 
            // Recherche initiale par défaut pour remplir la page d'accueil
            searchUniversalGames("Monopoly"); 
        }; 

        function filterGames() { 
            clearTimeout(typingTimer); 
            const query = document.getElementById('search-input').value.trim(); 
            
            if (query.length < 3) {
                if(query.length === 0) searchUniversalGames("Monopoly");
                return; 
            }

            typingTimer = setTimeout(() => { 
                searchUniversalGames(query); 
            }, 600); 
        } 

        async function searchUniversalGames(query) { 
            const grid = document.getElementById('games-grid'); 
            grid.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>🔍 Recherche mondiale en cours...</p>"; 

            try { 
                // Utilisation d'un proxy de secours open-source pour contourner le blocage CORS
                const targetUrl = `https://api.geekdo.com/xmlapi2/search?type=boardgame&query=${encodeURIComponent(query)}`;
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
                
                if (!response.ok) throw new Error("Réseau indisponible");
                
                const jsonWrapper = await response.json();
                const textData = jsonWrapper.contents; 
                
                const parser = new DOMParser(); 
                const xmlDoc = parser.parseFromString(textData, "text/xml"); 
                const items = xmlDoc.getElementsByTagName("item"); 

                activeGames = []; 

                for (let i = 0; i < items.length; i++) { 
                    const id = items[i].getAttribute("id");
                    const nameNode = items[i].getElementsByTagName("name")[0];
                    if (!nameNode) continue;
                    
                    const title = nameNode.getAttribute("value"); 
                    
                    activeGames.push({ 
                        id: id, 
                        title: title, 
                        desc: "Trouvé dans la base de données. Prêt à être ajouté à vos étagères.", 
                        img: "https://images.unsplash.com/photo-1610890716171-6b1bb98ffd09?w=500" 
                    }); 
                } 

                displayedCount = 10; 
                renderGames(); 

            } catch (error) { 
                console.error("Erreur Proxy/API, bascule sur la recherche locale forcée :", error); 
                fallbackSearch(query); 
            } 
        } 

        function fallbackSearch(query) { 
            activeGames = [{ 
                id: Date.now(), 
                title: query.charAt(0).toUpperCase() + query.slice(1), 
                desc: "Résultat instantané généré pour votre recherche.", 
                img: "https://images.unsplash.com/photo-1610890716171-6b1bb98ffd09?w=500" 
            }]; 
            displayedCount = 10; 
            renderGames(); 
        } 

        function renderGames() { 
            const grid = document.getElementById('games-grid'); 
            grid.innerHTML = ""; 

            const chunk = activeGames.slice(0, displayedCount); 

            if(chunk.length === 0) { 
                document.getElementById('not-found').style.display = "block"; 
                document.getElementById('load-more-btn').style.display = "none"; 
                return; 
            } else { 
                document.getElementById('not-found').style.display = "none"; 
            } 

            chunk.forEach(game => { 
                const amazonSearchUrl = `https://www.amazon.fr/s?k=${encodeURIComponent(game.title + ' jeu')}`; 
                const safeTitle = game.title.replace(/'/g, "\\'");

                const card = document.createElement('div'); 
                card.className = "game-card"; 
                card.innerHTML = `
                    <div>
                        <img src="${game.img}" class="game-img" alt="${game.title}">
                        <h3 class="game-title">${game.title}</h3>
                        <p class="game-desc">${game.desc}</p>
                        <a href="${amazonSearchUrl}" target="_blank" class="amazon-link">🛒 Trouver sur Amazon</a>
                    </div>
                    <div>
                        <div class="actions-box">
                            <button class="btn-action" onclick="saveToList('${safeTitle}', 'favoris')">⭐ Favoris</button>
                            <button class="btn-action" onclick="saveToList('${safeTitle}', 'souhaits')">💡 Souhaits</button>
                            <button class="btn-action" onclick="saveToList('${safeTitle}', 'etagere')">📦 Étagère</button>
                        </div>
                        <div class="rating-zone">
                            <span>Note :</span>
                            <span class="stars" onclick="rateGame('${safeTitle}')">⭐⭐⭐⭐☆</span>
                        </div>
                    </div>
                `; 
                grid.appendChild(card); 
            }); 

            const loadMoreBtn = document.getElementById('load-more-btn');
            if (loadMoreBtn) {
                if (displayedCount >= activeGames.length) { 
                    loadMoreBtn.style.display = "none"; 
                } else { 
                    loadMoreBtn.style.display = "inline-block"; 
                } 
            }
        }

        function loadMoreGames() {
            displayedCount += 10;
            renderGames();
        }

        function saveToList(gameTitle, listName) {
            let userData = JSON.parse(localStorage.getItem('user_lists') || '{"favoris":[],"souhaits":[],"etagere":[]}');
            if(!userData[listName].includes(gameTitle)) {
                userData[listName].push(gameTitle);
                localStorage.setItem('user_lists', JSON.stringify(userData));
                alert(`✨ "${gameTitle}" ajouté avec succès à votre liste [${listName}] !`);
            } else {
                alert(`"${gameTitle}" est déjà présent dans cette catégorie.`);
            }
        }

        function rateGame(gameTitle) {
            const comment = prompt(`Laissez un avis écrit pour le jeu "${gameTitle}" :`);
            if(comment && comment.trim() !== "") {
                let reviews = JSON.parse(localStorage.getItem('user_reviews') || '[]');
                reviews.push({ game: gameTitle, text: comment.trim(), date: new Date().toLocaleDateString() });
                localStorage.setItem('user_reviews', JSON.stringify(reviews));
                alert("Avis sauvegardé ! Visible sur votre profil.");
            }
        }

        function openAddGameForm() {
            const missingGame = document.getElementById('search-input').value;
            alert(`Le formulaire de proposition a bien enregistré le nom : "${missingGame}". Il sera traité sous 24h.`);
        }
    </script>
</body>
</html>
